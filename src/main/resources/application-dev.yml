# ===================================================================
# 开发环境配置文件 (Development Profile)
# 适用于本地开发调试。
# ===================================================================

server:
  # 本地服务启动端口
  port: 8081

spring:
  datasource:
    # 本地数据库连接地址
    url: jdbc:mysql://localhost:3306/asset_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    # 数据库用户名
    username: root
    # 数据库密码 (本地开发环境)
    password: root 
  
  redis:
    # 本地 Redis 地址
    host: localhost
    port: 6379
  
  data:
    solr:
      # 本地 Solr 全文检索服务器地址
      host: http://localhost:8983/solr

file:
  # 本地文件上传存储根目录 (Windows 路径示例)
  upload-dir: D:/data/asset_files
  # 本地回收站存储目录
  recycle-bin-dir: D:/data/asset_recycle_bin

auth:
  # 开发环境开关：是否对内部人员(role_type 1,2,3)校验密码
  # 设置为 false 则内部人员只需输入用户名即可登录，方便调试
  verify-internal-password: false
  # 登录 Token 有效期 (小时)
  token-expiration-hours: 6
  # JWT 签名密钥 (生产环境务必修改)
  secret-key: asset-management-secret-key-2026
  # 用户校验源：asset (内置表), sys (外部系统表)
  user-source: sys
  # AES 加密配置 (用于传输安全)
  aes-key: "ihaierForTodoKey"
  aes-iv: "ihaierForTodo_Iv"