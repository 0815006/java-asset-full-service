server:
  port: 8081

spring:
  application:
    name: asset-service
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 5000ms
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/asset_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root # 请根据实际情况修改密码
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  data:
    solr:
      host: http://localhost:8983/solr

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.asset.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境开启SQL日志
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

file:
  upload-dir: D:/data/asset_files

storage:
  location:
    public: uploads/public
    internal: uploads/internal
    confidential: uploads/confidential

auth:
  token-expiration-hours: 6
  secret-key: asset-management-secret-key-2026
